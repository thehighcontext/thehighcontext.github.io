<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>TheHighContext | Holding men to higher standards.</title>
    <style>
        /* Minimalist Dark Theme Reset & Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f11;
            color: #e6e6e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        /* Container */
        main {
            max-width: 600px;
            width: 100%;
            margin: auto 0;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #ffffff;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        p.motto {
            font-size: 1.1rem;
            color: #a0a0a0;
            font-style: italic;
            letter-spacing: 0.02em;
            margin-bottom: 2.5rem;
        }

        /* Social Media Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .link-btn {
            display: block;
            padding: 0.9rem 1.5rem;
            background-color: #1a1a1e;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #2a2a30;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background-color: #ffffff;
            color: #0f0f11;
            border-color: #ffffff;
        }

        /* Footer */
        footer {
            font-size: 0.8rem;
            color: #505050;
            margin-top: 3rem;
        }

        /* Responsiveness */
        @media (min-width: 600px) {
            h1 {
                font-size: 3.2rem;
            }
            p.motto {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <main>
        <header>
            <h1>TheHighContext</h1>
            <p class="motto">"Holding men to higher standards."</p>
        </header>

        <nav class="links">
            <a href="https://youtube.com/@TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">YouTube</a>
            <a href="https://substack.com/@TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">Substack</a>
            <a href="https://x.com/TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">X (Twitter)</a>
            <a href="https://instagram.com/TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a href="https://tiktok.com/@TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">TikTok</a>
        </nav>
    </main>

    <footer>
        &copy; TheHighContext. All rights reserved.
    </footer>

</body>
</html>
