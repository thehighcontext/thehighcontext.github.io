<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>TheHighContext | Holding men to higher standards.</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Minimalist Dark Theme Reset & Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #e6e6e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        /* Container */
        main {
            max-width: 600px;
            width: 100%;
            margin: auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Content Wrapper sized dynamically by the image width */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: fit-content;
            max-width: 100%;
        }

        /* Typography & Logo */
        .site-logo {
            display: block;
            max-width: 100%;
            height: auto;
            max-height: 60px; /* Adjust based on your logo's proportions */
            margin-bottom: 1rem;
            object-fit: contain;
        }

        p.motto {
            font-size: 1.1rem;
            color: #a0a0a0;
            font-style: italic;
            letter-spacing: 0.02em;
            margin-bottom: 2.5rem;
        }

        /* Social Media Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%; /* Matches wrapper width, which is set by the logo */
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.9rem 1.5rem;
            background-color: #000;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #2a2a30;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .link-btn i {
            font-size: 1.1rem;
        }

        .link-btn:hover {
            background-color: #ffffff;
            color: #0f0f11;
            border-color: #ffffff;
        }

        /* Footer */
        footer {
            font-size: 0.8rem;
            color: #505050;
            margin-top: 3rem;
        }

        /* Responsiveness */
        @media (min-width: 600px) {
            .site-logo {
                max-height: 60px; /* Scales up slightly on larger screens */
            }
            p.motto {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <main>
        <div class="content-wrapper">
            <header>
                <img src="/logo.png" alt="TheHighContext Logo" class="site-logo">
                <p class="motto">"Holding men to higher standards."</p>
            </header>

            <nav class="links">
                <a href="https://youtube.com/@TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-youtube"></i> YouTube
                </a>
                <a href="https://substack.com/@TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-bookmark"></i> Substack
                </a>
                <a href="https://x.com/TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-x-twitter"></i> X (Twitter)
                </a>
                <a href="https://instagram.com/TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-instagram"></i> Instagram
                </a>
                <a href="https://tiktok.com/@TheHighContext" class="link-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-tiktok"></i> TikTok
                </a>
            </nav>
        </div>
    </main>

    <footer>
        &copy; 2026 TheHighContext. All rights reserved.
    </footer>

</body>
</html>
